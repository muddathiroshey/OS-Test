      {q:"What is the Convoy Effect in FCFS?",opts:["Short processes run before long ones","Short processes get stuck behind long processes","Processes run in reverse order","All processes have equal waiting time"],ans:1,exp:["Short processes running first describes SJF, not FCFS.", "Convoy Effect: short processes get stuck behind a long process in FCFS, causing high average waiting time.", "FCFS runs processes in arrival order, not reverse.", "FCFS is non-preemptive and arrival-order based - waiting times are very unequal."],src:"Lecture 5 > FCFS Scheduling"},
      {q:"In Round Robin scheduling, what happens after a process uses its time quantum?",opts:["It terminates","It is moved to wait queue","It is preempted and added to end of ready queue","It gets a higher priority"],ans:2,exp:["The process does not terminate when its quantum expires unless it naturally finishes.", "Moving to wait queue happens when a process requests I/O, not when its quantum expires.", "After the time quantum expires, the process is preempted and added to the end of the ready queue.", "Priority is not changed by time quantum expiry in basic Round Robin."],src:"Lecture 5 > Round Robin (RR)"},
      {q:"What is Starvation in priority scheduling?",opts:["A process consuming too much memory","Low priority processes may never execute","A process blocked on I/O","CPU being idle"],ans:1,exp:["Memory consumption is not related to priority starvation.", "Starvation: low priority processes may never execute if higher-priority processes keep arriving.", "I/O blocking is the Waiting state - not starvation.", "CPU idle time is a utilization concern, not starvation."],src:"Lecture 5 > Priority Scheduling"},
      {q:"What is Aging in priority scheduling?",opts:["Decreasing priority over time","Increasing priority of processes as time progresses","Removing old processes","Resetting priorities to zero"],ans:1,exp:["Decreasing priority over time would worsen starvation.", "Aging gradually increases the priority of waiting processes over time, preventing starvation.", "Removing old processes is not aging.", "Resetting priorities to zero defeats the purpose of priority scheduling."],src:"Lecture 5 > Priority Scheduling - Aging"},
      {q:"The Dispatcher is responsible for:",opts:["Choosing which process to run next","Giving control of the CPU to the selected process","Managing memory allocation","Handling I/O requests"],ans:1,exp:["Choosing which process runs next is the CPU Scheduler's job, not the Dispatcher.", "The Dispatcher gives control of the CPU to the selected process - handles context switching, mode switching, and jumping to the correct program location.", "Memory allocation is the Memory Manager's job.", "I/O requests are handled by the I/O Management component."],src:"Lecture 5 > Dispatcher"},
      {q:"Dispatch latency is:",opts:["Time for a process to complete","Time to stop one process and start another","Time for a context switch to complete memory operations","Time between two I/O bursts"],ans:1,exp:["Time for a process to complete is Turnaround Time.", "Dispatch latency: the time it takes the dispatcher to stop one process and start another running.", "Memory operations during context switching are part of the overhead but not the definition of dispatch latency.", "Time between I/O bursts is part of the CPU/I/O burst cycle."],src:"Lecture 5 > Dispatcher - Dispatch Latency"},
      {q:"In FCFS with P1=24, P2=3, P3=3 arriving in order P1,P2,P3, what is the average waiting time?",opts:["3","17","27","9"],ans:1},
      {q:"SRTF (Shortest Remaining Time First) is the preemptive version of which algorithm?",opts:["FCFS","Round Robin","Priority Scheduling","SJF"],ans:3,exp:["The preemptive version of FCFS is not a standard algorithm.", "Preemptive Round Robin is just Round Robin with a quantum.", "Preemptive Priority is a different algorithm.", "SRTF is the preemptive version of SJF."],src:"Lecture 5 > Shortest Remaining Time First"},
      {q:"Which scheduling criterion should be minimized?",opts:["CPU utilization","Throughput","Turnaround time","None of the above"],ans:2,exp:["CPU utilization should be maximized, not minimized.", "Throughput should be maximized, not minimized.", "Turnaround time should be minimized - total time from job submission to completion.", "All criteria have defined optimization directions."],src:"Lecture 5 > Scheduling Algorithm Optimization Criteria"},
      {q:"If q is very large in Round Robin scheduling, it behaves like:",opts:["SJF","Priority Scheduling","FCFS","SRTF"],ans:2,exp:["SJF orders processes by burst length - large q in RR does not reorder them.", "Priority scheduling uses priorities - RR with large q does not implement priorities.", "When q is large in RR, each process runs to completion before preemption - this is FCFS/FIFO behavior.", "SRTF requires knowing burst lengths - not related to q size in RR."],src:"Lecture 5 > Round Robin"},
      {q:"Response Time is calculated as:",opts:["Completion Time – Arrival Time","Time when process first gets CPU – Arrival Time","Burst Time – Waiting Time","Turnaround Time – Burst Time"],ans:1,exp:["Completion minus Arrival = Turnaround Time.", "Response Time = Time when process first gets CPU - Arrival Time. Measures how quickly the process first responds.", "Burst minus Waiting is not a standard formula.", "Turnaround minus Burst = Waiting Time."],src:"Lecture 5 > CPU Scheduling Criteria"},
      {q:"Processes: P1 (burst=5, priority=3), P2 (burst=3, priority=1), P3 (burst=1, priority=4), P4 (burst=4, priority=2). All arrive at t=0. Using non-preemptive priority (lower number = higher priority), what is the order of execution?",opts:["P1→P2→P3→P4","P2→P4→P1→P3","P3→P1→P4→P2","P2→P3→P1→P4"],ans:1},
      {q:"With Round Robin (q=3), processes P1(burst=7), P2(burst=4), P3(burst=3) all arrive at t=0. When does P3 finish?",opts:["t=6","t=7","t=9","t=10"],ans:2,exp:["t=6 is when P3 gets the CPU - it still needs 3ms.", "t=7 is when P2 finishes.", "With q=3: P1(0-3), P2(3-6), P3(6-9). P3 finishes at t=9.", "t=10 would require scheduling delays."],src:"Lecture 5 > Round Robin - Calculation"},
      {q:"In preemptive priority scheduling, P1(burst=10, priority=3) arrives at t=0. P2(burst=1, priority=1) arrives at t=1. What happens at t=1?",opts:["P1 continues until completion","P2 preempts P1 immediately","P2 joins the ready queue and waits","The scheduler ignores P2 until P1 finishes"],ans:1,exp:["Preemptive scheduling does not wait.", "P2 arrives at t=1 with priority 1, higher than P1's priority 3. P2 immediately preempts P1.", "P2 does not wait in preemptive scheduling.", "The scheduler uses the new priority immediately."],src:"Lecture 5 > Preemptive Priority Scheduling"},
      {q:"Why does preemptive scheduling risk race conditions?",opts:["Processes run for too long","A process can be interrupted while modifying shared data leaving it in an inconsistent state","The ready queue grows too large","Context switches are too slow"],ans:1,exp:["Long-running processes are a fairness issue, not the cause of race conditions.", "A process can be interrupted mid-update to shared data, leaving it in an inconsistent state for the next process.", "Queue size is a performance concern, not the cause of race conditions.", "Context switches themselves don't cause race conditions - the problem is accessing shared data mid-modification."],src:"Lecture 5 > Preemptive Scheduling and Race Conditions"},
      {q:"P1 arrives at t=0 with burst=8, P2 arrives at t=1 with burst=4 (SRTF). At t=1, P1 has 7 remaining. What happens?",opts:["P1 continues since it arrived first","P2 preempts P1 because P2's burst (4) < P1's remaining (7)","Both run concurrently","P2 must wait for P1 to finish"],ans:1},
      {q:"CPU utilization range for a Real-Time Operating System (RTOS) is:",opts:["0–50%","40–90%","60–100%","10–40%"],ans:1,exp:["0-50% is too low for RTOS requirements.", "RTOS CPU utilization ranges from 40% for low-level to 90% for high-level systems.", "60-100% does not match the stated RTOS range.", "10-40% is too low for RTOS requirements."],src:"Lecture 5 > CPU Scheduling Criteria - CPU Utilization"},
      {q:"Which statement correctly distinguishes response time from turnaround time?",opts:["They are identical metrics","Response time is when the process first gets CPU minus arrival; turnaround is total time from submission to completion","Turnaround time is always shorter","Response time includes I/O wait time"],ans:1,exp:["They are not identical - they measure different things.", "Response time: when process first gets CPU minus arrival. Turnaround: total time from submission to completion.", "Turnaround time is always >= Response time, not shorter.", "Response time does not include I/O wait after the first response."],src:"Lecture 5 > CPU Scheduling Criteria"},
    ],
    tf: [
      {q:"SJF scheduling is optimal as it gives minimum average waiting time.",ans:true,exp:"SJF is provably optimal - it gives the minimum average waiting time for any given set of processes. Serving the shortest job first minimizes total queue wait.",src:"Lecture 5 > SJF Scheduling"},
      {q:"FCFS is a preemptive scheduling algorithm.",ans:false,exp:"FCFS is NONPREEMPTIVE - once the CPU is allocated to a process, that process keeps it until it terminates or blocks for I/O. There is no forced preemption in FCFS.",src:"Lecture 5 > FCFS Scheduling"},
      {q:"Turnaround Time equals Burst Time plus Waiting Time.",ans:true,exp:"Turnaround Time = Completion Time - Arrival Time = Burst Time + Waiting Time. Both formulas are equivalent and correct.",src:"Lecture 5 > CPU Scheduling Criteria"},
      {q:"Starvation can be solved using Aging.",ans:true,exp:"Aging is the solution to starvation in priority scheduling. As time progresses, the OS gradually increases the priority of waiting processes, ensuring they eventually receive CPU time.",src:"Lecture 5 > Priority Scheduling - Aging"},
      {q:"In Round Robin, if time quantum q is very small, it behaves like FCFS.",ans:false,exp:"When q is LARGE in RR, it behaves like FCFS (each process runs to completion). When q is SMALL, overhead from frequent context switches increases - more like pure round-robin.",src:"Lecture 5 > Round Robin"},
      {q:"The Dispatcher is the module that selects which process runs next from the ready queue.",ans:false,exp:"The CPU SCHEDULER selects which process runs next. The DISPATCHER is the module that gives control of the CPU to the selected process - it handles context switching, mode switching, and jumping to the correct location.",src:"Lecture 5 > Dispatcher"},
      {q:"Preemptive scheduling can result in race conditions when data is shared among processes.",ans:true,exp:"Preemptive scheduling can cause race conditions: a process updating shared data gets preempted mid-update, and the next scheduled process reads inconsistent (partially updated) data.",src:"Lecture 5 > Preemptive Scheduling and Race Conditions"},
      {q:"Nonpreemptive scheduling: once CPU is allocated, the process keeps it until it terminates or waits.",ans:true,exp:"Under nonpreemptive scheduling, a process keeps the CPU until it either terminates (exit) or switches to the waiting state (e.g., requests I/O). It is never forcibly removed.",src:"Lecture 5 > Nonpreemptive Scheduling"},
      {q:"Throughput should be maximized in CPU scheduling.",ans:true,exp:"Throughput (number of processes completing per unit time) should be MAXIMIZED. Higher throughput means the system is efficiently processing work.",src:"Lecture 5 > Scheduling Algorithm Optimization Criteria"},
      {q:"Response time should be maximized in CPU scheduling criteria.",ans:false,exp:"Response time should be MINIMIZED, not maximized. Minimizing response time means the system responds to requests as quickly as possible, improving user experience.",src:"Lecture 5 > Scheduling Algorithm Optimization Criteria"},
      {q:"In non-preemptive SJF, if two processes have equal burst time, FCFS order breaks the tie.",ans:true,exp:"When two processes have equal burst time in SJF, the tie is broken by arrival order (FCFS) - the process that arrived first runs first.",src:"Lecture 5 > SJF Scheduling"},
      {q:"The convoy effect in FCFS can be avoided by reordering processes so shortest jobs run first.",ans:true,exp:"Reordering so shortest jobs run first is exactly SJF, which does avoid the convoy effect. The FCFS example in the lecture shows that changing order from P1,P2,P3 to P2,P3,P1 reduces average waiting time from 17 to 3.",src:"Lecture 5 > FCFS Scheduling - Convoy Effect"},
      {q:"A process with the lowest priority number has the highest scheduling priority.",ans:true,exp:"In priority scheduling, the smallest integer = highest priority. Priority 1 runs before priority 2, 3, etc. This convention is used throughout the lecture examples.",src:"Lecture 5 > Priority Scheduling"},
      {q:"Round Robin guarantees that no process waits more than (n-1)×q time units.",ans:true,exp:"In RR with n processes and time quantum q, each process gets CPU time in chunks of q. In the worst case, a process waits while all n-1 other processes run - so maximum wait = (n-1) x q time units.",src:"Lecture 5 > Round Robin"},
      {q:"Dispatch latency is included in the useful CPU utilization time.",ans:false,exp:"Dispatch latency is OVERHEAD - it is the time the dispatcher spends stopping one process and starting another. During this time, no useful user work is done. It should be minimized, not counted as useful work.",src:"Lecture 5 > Dispatcher"},
    ]
  },
  {
    id: 6,
    title: "Memory Management Part 1",
    mc: [
      {q:"What is the job of the Memory Manager?",opts:["Manage CPU scheduling","Track memory usage, allocate/deallocate memory, manage swapping","Handle file system operations","Control device drivers"],ans:1,exp:["CPU scheduling is the CPU Scheduler's job.", "The memory manager tracks memory usage, allocates/deallocates memory, and manages swapping between main memory and disk.", "File system operations are the File System component's job.", "Device drivers are managed by the Device Management component."],src:"Lecture 6 > Introduction - Memory Manager"},
      {q:"Monoprogramming without Swapping or Paging means:",opts:["Multiple programs run at the same time","Only one program runs at a time sharing memory with OS","Programs are swapped between disk and RAM","Virtual memory is used"],ans:1,exp:["Running multiple programs simultaneously requires multiprogramming.", "Monoprogramming: only one process at a time, sharing memory between the OS and that one program.", "Swapping between disk and RAM is a different technique.", "Virtual memory allows partial loading - Monoprogramming is simpler."],src:"Lecture 6 > Monoprogramming"},
      {q:"What is the Relocation Problem?",opts:["Programs using wrong file paths","Programs referencing absolute addresses that change when loaded at different locations","Memory being full","Programs crashing due to bugs"],ans:1,exp:["File paths are unrelated to the relocation problem.", "Relocation Problem: programs reference absolute addresses, but these become wrong when loaded at different memory locations.", "Full memory is a capacity problem, not the relocation problem.", "Programs crashing due to bugs is a software error."],src:"Lecture 6 > Relocation and Protection"},
      {q:"Base and Limit Registers solve which two problems?",opts:["Fragmentation and Deadlock","Relocation and Protection","Swapping and Paging","Scheduling and I/O"],ans:1,exp:["Fragmentation and deadlock are different problems.", "Base and Limit Registers solve both relocation (adding base to every address) and protection (checking against the limit).", "Swapping and paging are memory management techniques.", "Scheduling and I/O are unrelated to base/limit registers."],src:"Lecture 6 > Base and Limit Registers"},
      {q:"What does the Base Register contain when a process runs?",opts:["The length of the program","The physical address where the program begins in memory","The process priority","The page table address"],ans:1,exp:["The length/size is in the Limit Register, not the Base.", "The base register holds the physical address where the program begins in memory.", "Process priority is stored in the PCB, not a memory register.", "Page table address is used in paging, not the base register approach."],src:"Lecture 6 > Base and Limit Registers"},
      {q:"What does the Limit Register contain?",opts:["The starting address of the program","The length/size of the program","The base address","The page frame number"],ans:1,exp:["The starting physical address is in the Base Register.", "The limit register contains the length/size of the program. Access beyond base+limit triggers a fault.", "The base address is in the Base Register.", "Page frame number is a paging concept."],src:"Lecture 6 > Base and Limit Registers"},
      {q:"What is MFT?",opts:["Memory Fragmentation Technique","Multiprogramming with a Fixed number of Tasks","Main Frame Technology","Memory Fault Trap"],ans:1,exp:["Memory Fragmentation Technique is not a real OS concept.", "MFT = Multiprogramming with a Fixed number of Tasks - used by OS/360 on IBM mainframes.", "Main Frame Technology is not what MFT stands for.", "Memory Fault Trap is not what MFT stands for."],src:"Lecture 6 > Multiprogramming with Fixed Partitions - MFT"},
      {q:"In Multiprogramming with Fixed Partitions, what happens to space in a partition not used by a job?",opts:["It is given to another job","It is swapped to disk","It is wasted while that job runs","It becomes a hole"],ans:2},
      {q:"Static Relocation means:",opts:["Programs are loaded at fixed addresses always","Adding a constant to every address as the program loads","Dynamically adjusting addresses at runtime","Using virtual memory"],ans:1,exp:["Programs being loaded at fixed addresses always would eliminate relocation.", "Static relocation adds the load address constant to every program address during loading. JMP 28 becomes JMP 16412 if loaded at 16384.", "Dynamic adjustment at runtime describes dynamic relocation with base registers.", "Virtual memory is a different technique."],src:"Lecture 6 > Relocation and Protection - Static Relocation"},
      {q:"What is the PSW in the context of IBM 360 memory protection?",opts:["Page Size Word","Program Status Word","Process State Write","Primary Storage Word"],ans:1,exp:["Page Size Word is not what PSW stands for.", "PSW = Program Status Word - it contained a 4-bit key for the IBM 360 memory protection scheme.", "Process State Write is not what PSW stands for.", "Primary Storage Word is not what PSW stands for."],src:"Lecture 6 > Relocation and Protection - IBM 360"},
      {q:"What is the main disadvantage of using base and limit registers?",opts:["They require too much memory","Addition and comparison must be performed on every memory reference","They do not support multiple processes","They are not supported by modern hardware"],ans:1,exp:["Base and limit registers use very little memory.", "Every memory reference requires adding the base (relocation) and comparing with the limit (protection) - additions are slow due to carry-propagation time.", "Base/limit registers work with multiple processes - they are how multiprogramming memory protection works.", "Modern hardware does support base/limit registers."],src:"Lecture 6 > Base and Limit Registers"},
      {q:"In early computers without memory abstraction, programs could:",opts:["Use virtual memory","Access only their own memory","Access any physical memory address","Only run one at a time with protection"],ans:2,exp:["Virtual memory did not exist in early computers without memory abstraction.", "Only accessing their own memory would require protection mechanisms - which did not exist.", "Without memory abstraction, every program sees physical memory directly - any program could write to any address.", "Running one at a time with protection is Monoprogramming - but early systems had no protection."],src:"Lecture 6 > Monoprogramming - No Memory Abstraction"},
      {q:"Program A is loaded at address 16,384. It executes JMP 28. With base register = 16,384, what physical address does it jump to?",opts:["28","16,384","16,412","16,356"],ans:2},
      {q:"The IBM 360 had 1MB of memory with 2KB protection blocks. How many 4-bit protection keys were needed?",opts:["256","512","1024","2048"],ans:1,exp:["256 blocks would be for 4KB block size.", "1MB / 2KB = 512 blocks, needing 512 four-bit protection keys.", "1024 blocks would be for 1KB block size.", "2048 blocks would be for 512-byte blocks."],src:"Lecture 6 > IBM 360 Memory Protection"},
      {q:"A process generates address 500. Base register = 10,000. Limit register = 1,000. What happens?",opts:["Physical address 10,500 is accessed","A fault is generated — address exceeds limit","Physical address 500 is accessed","The OS swaps the process out"],ans:0,exp:["Physical address 10,500 is accessed (500 < limit 1000 - access is valid).", "500 < 1000 (limit) so access is valid. Physical = 10,000 + 500 = 10,500.", "10,500 is the physical address - this IS the correct answer.", "No swap occurs."],src:"Lecture 6 > Base and Limit Registers"},
      {q:"Why is static relocation not a general solution to the relocation problem?",opts:["It is too slow","It requires extra metadata in executables to distinguish addresses from constants, and is error-prone","It cannot handle large programs","It only works on IBM hardware"],ans:1,exp:["Speed is not the main reason.", "Static relocation requires extra metadata in executables to distinguish addresses from constants, and is error-prone.", "Memory usage is not why static relocation fails.", "Static relocation does not require special hardware - but it requires extra effort in executable files."],src:"Lecture 6 > Relocation and Protection - Static Relocation"},
      {q:"In Fixed Partition multiprogramming, a rule states a job can be skipped at most k times. What is the purpose of this rule?",opts:["To improve CPU utilization","To prevent small jobs from being indefinitely skipped by always choosing the largest fitting job","To reduce fragmentation","To speed up context switching"],ans:1,exp:["CPU utilization improvement is a general goal.", "The k-times rule prevents small jobs from being indefinitely bypassed when the scheduler always picks the largest fitting job.", "Fragmentation is not related to this rule.", "Context switching speed is not related to this rule."],src:"Lecture 6 > Multiprogramming with Fixed Partitions"},
      {q:"Two 16KB programs are loaded consecutively starting at address 0. The second program executes JMP 28. Without relocation, where does it jump?",opts:["Address 28 in its own space","Address 16,412","Address 28 in the first program's code","Address 16,384"],ans:2},
      {q:"What happens when a running process tries to access an address beyond its Limit Register value?",opts:["The address is rounded down to the limit","A hardware fault is generated and the access is aborted","The OS expands the limit register","The process is moved to a new partition"],ans:1,exp:["The address is not rounded down.", "A hardware fault is generated and the access is aborted.", "The OS does not expand the limit register.", "The process is not moved."],src:"Lecture 6 > Base and Limit Registers"},
    ],
    tf: [
      {q:"In Monoprogramming, two programs can run simultaneously in memory.",ans:false,exp:"In Monoprogramming, only ONE process can run at a time. The OS and one program share memory. The second program must wait until the first completes.",src:"Lecture 6 > Monoprogramming"},
      {q:"Base and Limit registers solve both the relocation and protection problems.",ans:true,exp:"The base register handles RELOCATION (adds base to every address), and the limit register handles PROTECTION (rejects addresses beyond the limit). Together they solve both problems.",src:"Lecture 6 > Base and Limit Registers"},
      {q:"The Limit Register holds the physical starting address of the program in memory.",ans:false,exp:"The Limit Register holds the LENGTH/SIZE of the program. The BASE Register holds the physical starting address. These are two separate registers with different roles.",src:"Lecture 6 > Base and Limit Registers"},
      {q:"MFT stands for Multiprogramming with a Fixed number of Tasks.",ans:true,exp:"MFT = Multiprogramming with a Fixed number of Tasks. It was used by OS/360 on IBM mainframes - jobs are queued until a suitable fixed partition is available.",src:"Lecture 6 > Multiprogramming with Fixed Partitions - MFT"},
      {q:"Static relocation adds a constant to every program address during the load process.",ans:true,exp:"Static relocation adds the load address constant to every program address during loading. For example, loading at 16,384 means 'JMP 28' becomes 'JMP 16,412' - the constant is added to every address.",src:"Lecture 6 > Relocation and Protection - Static Relocation"},
      {q:"In early computers without memory abstraction, two programs could safely run simultaneously.",ans:false,exp:"Without memory abstraction, two programs running simultaneously would corrupt each other's memory immediately. If program 1 writes to location 2000, it erases what program 2 stored there.",src:"Lecture 6 > Monoprogramming - No Memory Abstraction"},
      {q:"IBM 360 divided memory into 2-KB blocks and assigned a 4-bit protection code to each.",ans:true,exp:"IBM 360 divided memory into 2-KB blocks, each with a 4-bit protection code. A 1-MB memory needs 512 blocks = 512 four-bit keys = 256 bytes of key storage inside the CPU.",src:"Lecture 6 > IBM 360 Memory Protection"},
      {q:"The PSW stands for Program Status Word.",ans:true,exp:"PSW = Program Status Word. In IBM 360, the PSW contained a 4-bit key. Hardware trapped any attempt by a running process to access memory with a different protection code.",src:"Lecture 6 > IBM 360 - PSW"},
      {q:"Memory managers in most systems reside in the kernel.",ans:true,exp:"The memory manager resides in the kernel in most systems - it needs privileged access to manage all physical memory, enforce protection, and control swapping.",src:"Lecture 6 > Introduction - Memory Manager"},
      {q:"Fixed partitions waste no memory since jobs always fill their partition completely.",ans:false,exp:"Fixed partitions DO waste memory. Any unused space within a partition cannot be given to another job while the current job runs - this is called internal fragmentation.",src:"Lecture 6 > Multiprogramming with Fixed Partitions"},
      {q:"Every memory reference in a base-register system requires an addition of the base value.",ans:true,exp:"Every time a process references memory (fetch instruction, read data, write data), the CPU hardware automatically adds the base register value to the address before it goes onto the memory bus.",src:"Lecture 6 > Base and Limit Registers"},
      {q:"Static relocation fully solves the protection problem by preventing programs from accessing each other's memory.",ans:false,exp:"Static relocation does NOT solve the protection problem. A malicious program can always construct a new instruction and jump to any absolute address in memory - there is no prevention mechanism.",src:"Lecture 6 > Relocation and Protection"},
      {q:"In multiprogramming with fixed partitions, using a single queue is always more efficient than multiple separate queues.",ans:false,exp:"It is a trade-off, not always more efficient. With separate queues, a large partition queue can be empty while small queues are full. A single queue with 'skip if too large' also discriminates against small jobs.",src:"Lecture 6 > Multiprogramming with Fixed Partitions"},
      {q:"The base register value is automatically added by the CPU hardware to every address a process generates.",ans:true,exp:"Every time a process references memory, the CPU hardware automatically adds the base register value to the generated address before sending it on the memory bus - this is fully transparent to software.",src:"Lecture 6 > Base and Limit Registers"},
      {q:"A program that uses only relative addresses never needs relocation.",ans:true,exp:"A program using only relative addresses (offsets from a base) is self-consistent regardless of where it is loaded. Relocation is needed only for programs that use absolute physical memory addresses.",src:"Lecture 6 > Relocation and Protection"},
    ]
  },
  {
    id: 7,
    title: "Memory Management Part 2",
    mc: [
      {q:"What are the two general approaches to dealing with memory overload?",opts:["Paging and Segmentation","Swapping and Virtual Memory","Compaction and Fragmentation","Bitmap and Linked List"],ans:1,exp:["Paging and Segmentation are memory addressing techniques.", "Two approaches to memory overload: Swapping (bring whole process to memory, run, swap back) and Virtual Memory (run partially in memory).", "Compaction and Fragmentation describe memory states.", "Bitmap and Linked List are memory tracking data structures."],src:"Lecture 7 > Introduction"},
      {q:"What is Swapping?",opts:["Dividing memory into pages","Bringing a process entirely into memory, running it, then putting it back on disk","Mapping virtual addresses to physical addresses","Dividing memory into fixed partitions"],ans:1,exp:["Dividing into pages is paging, not swapping.", "Swapping: bring the entire process into memory, run it, then put it back on disk. Idle processes stay on disk.", "Mapping virtual to physical addresses is paging/MMU work.", "Fixed partitions is a memory partitioning scheme."],src:"Lecture 7 > Swapping"},
      {q:"What is Memory Compaction?",opts:["Dividing memory into pages","Combining all holes by moving all processes downward","Swapping processes to disk","Using a bitmap to track memory"],ans:1,exp:["Dividing memory into pages is paging.", "Memory compaction moves all processes downward to combine scattered holes into one large contiguous hole.", "Swapping processes to disk is swapping, not compaction.", "Bitmap tracking is a memory management data structure."],src:"Lecture 7 > Swapping - Memory Compaction"},
      {q:"Why is memory compaction usually not done?",opts:["It is too complex to implement","It requires a lot of CPU time","It is not supported by modern OS","It increases fragmentation"],ans:1,exp:["Complexity is not the primary reason.", "Compaction on a 16GB machine copying 8 bytes per 8 nsec takes about 16 seconds - too much CPU time.", "Modern OSes do support compaction in concept.", "Compaction reduces fragmentation - it does not increase it."],src:"Lecture 7 > Swapping - Memory Compaction"},
      {q:"In the First-Fit memory allocation algorithm, the memory manager:",opts:["Searches the entire list for the smallest hole","Takes the largest available hole","Scans until it finds the first hole big enough","Starts searching from where it left off last time"],ans:2,exp:["Searching for the smallest hole is Best-Fit.", "Taking the largest hole is Worst-Fit.", "First-Fit scans the list from the beginning and takes the first hole that is big enough.", "Starting from where it left off is Next-Fit."],src:"Lecture 7 > Memory Management with Linked Lists - First-Fit"},
      {q:"What is the difference between First-Fit and Next-Fit?",opts:["Next-Fit always takes the smallest hole","Next-Fit starts searching from where it left off last time","Next-Fit takes the largest hole","Next-Fit searches the entire list"],ans:1,exp:["Always taking the smallest hole is Best-Fit.", "Next-Fit works like First-Fit but starts searching from where it left off last time.", "Taking the largest hole is Worst-Fit.", "Searching the entire list is Best-Fit."],src:"Lecture 7 > Memory Management with Linked Lists - Next-Fit"},
      {q:"Best-Fit algorithm searches for:",opts:["The largest hole","The first hole big enough","The smallest hole that is adequate","A hole exactly equal to the process size"],ans:2,exp:["Taking the largest hole is Worst-Fit.", "Taking the first adequate hole is First-Fit.", "Best-Fit searches the entire list and takes the smallest hole that is adequate.", "An exact match would be ideal but Best-Fit settles for the smallest adequate hole."],src:"Lecture 7 > Memory Management with Linked Lists - Best-Fit"},
      {q:"Which allocation algorithm is considered worst in terms of storage utilization?",opts:["First-Fit","Best-Fit","Next-Fit","Worst-Fit"],ans:3,exp:["First-Fit is better than Worst-Fit in storage utilization.", "Best-Fit is better than Worst-Fit in storage utilization.", "Next-Fit is a variant of First-Fit - also better than Worst-Fit.", "Worst-Fit always takes the largest available hole. Simulation shows it has the worst storage utilization."],src:"Lecture 7 > Memory Management with Linked Lists"},
      {q:"External Fragmentation occurs when:",opts:["A process uses more memory than allocated","There is enough total memory but available spaces are not contiguous","The page table is too large","A process swaps too frequently"],ans:1,exp:["Using more memory than allocated is not fragmentation.", "External fragmentation: enough total free memory exists but it is broken into non-contiguous pieces that cannot satisfy a large request.", "Page table size is a paging concern.", "Swap frequency is a performance issue."],src:"Lecture 7 > Fragmentation"},
      {q:"What solution does paging provide for external fragmentation?",opts:["It compacts memory holes","It allows noncontiguous allocation of physical memory","It increases physical memory size","It eliminates the need for page tables"],ans:1,exp:["Compacting holes is memory compaction - paging does not compact.", "Paging permits logical address space to be noncontiguous - a process can be allocated physical memory wherever frames are available.", "Increasing physical memory is a hardware solution.", "Paging does not eliminate page tables - it relies on them."],src:"Lecture 7 > Fragmentation - Solution: Paging"},
      {q:"In memory management with bitmaps, what does a 0 bit indicate?",opts:["The unit is occupied","The unit is free","A page fault has occurred","The unit is protected"],ans:1,exp:["A 1 bit indicates occupied - not free.", "In a bitmap: 0 = unit is free, 1 = unit is occupied.", "A page fault is a virtual memory concept.", "Protection is handled by page table entries, not bitmap bits."],src:"Lecture 7 > Memory Management with Bitmaps"},
      {q:"What is the main problem with bitmap memory management?",opts:["Bitmaps use too much memory","Searching for a run of k consecutive 0 bits is slow","Bitmaps cannot track large memory","Bitmaps require special hardware"],ans:1,exp:["A 32-bit-per-4-byte bitmap uses only 1/32 of memory.", "The main problem: searching for k consecutive 0 bits to find a k-unit hole is a slow operation.", "Bitmaps scale with memory size - they can track large memory.", "Bitmaps are a software data structure - no special hardware needed."],src:"Lecture 7 > Memory Management with Bitmaps"},
      {q:"Memory has holes of sizes 100KB, 500KB, 200KB, 300KB, 600KB in order. A process needs 212KB. Which hole does First-Fit choose?",opts:["100KB","500KB","200KB","300KB"],ans:1},
      {q:"Using the same holes (100, 500, 200, 300, 600KB) and a request of 212KB, which hole does Best-Fit choose?",opts:["200KB","300KB","500KB","600KB"],ans:1,exp:["200KB is the smallest hole that fits 212KB... actually 212 > 200, so it doesn't fit.", "300KB is the smallest hole that is adequate for 212KB in Best-Fit (300 > 212, 200 < 212).", "500KB fits but Best-Fit takes the smallest adequate hole, which is 300KB.", "600KB fits but it is larger than needed."],src:"Lecture 7 > Memory Management with Linked Lists - Best-Fit"},
      {q:"A process is swapped out, then swapped back in at a different memory address. What must be adjusted?",opts:["The process priority","All memory addresses in the process (relocation)","The process's file handles","The PCB state field"],ans:1,exp:["Process priority is stored in the PCB - not what needs to be adjusted for relocation.", "All memory addresses in the process must be adjusted (relocation) when loaded at a new address.", "File handles are not memory addresses.", "The PCB state field tracks execution state, not address relocation."],src:"Lecture 7 > Swapping"},
      {q:"Memory has 16GB, copying speed is 8 bytes per 8 nsec. How long does full compaction take?",opts:["About 1 sec","About 8 sec","About 16 sec","About 32 sec"],ans:2,exp:["1 second would require 16 GB/sec.", "4 seconds would require 4 GB/sec.", "At 8 bytes/8 nsec = 1 GB/sec, copying 16 GB takes approximately 16 seconds.", "32 seconds is too slow."],src:"Lecture 7 > Swapping - Memory Compaction"},
      {q:"After process B terminates, the linked list shows: [Hole|Process A|Hole]. What happens?",opts:["Three separate entries remain","The two holes are merged into one larger hole","Process A is moved to fill the holes","The list is rebuilt from scratch"],ans:0,exp:["Three separate entries remain - the two holes on either side of Process A are separate holes (not adjacent to each other).", "The two holes are not adjacent - Process A is between them. No merge is possible.", "Process A is not moved - it stays in place.", "The list is not rebuilt from scratch."],src:"Lecture 7 > Memory Management with Linked Lists"},
      {q:"A bitmap uses 1-bit per 4-byte allocation unit. What fraction of memory does the bitmap itself consume?",opts:["1/8","1/16","1/32","1/64"],ans:2,exp:["1/8 would be for a 1-bit-per-1-byte allocation unit.", "1/16 would be for a 1-bit-per-2-byte allocation unit.", "1-bit per 4-byte unit means 1 bit tracks 4 bytes = 1/32 of memory used by the bitmap.", "1/64 would be for a 1-bit-per-8-byte allocation unit."],src:"Lecture 7 > Memory Management with Bitmaps"},
      {q:"In which scenario would Worst-Fit potentially outperform Best-Fit?",opts:["When processes are uniform in size","When large holes are needed after allocation so leftover holes remain usable","When memory is nearly full","When all holes are the same size"],ans:1,exp:["When processes are uniform in size, all algorithms perform similarly.", "When large holes are needed after allocation so leftover holes remain large and usable - Worst-Fit leaves the largest remainders.", "When memory is nearly full, Worst-Fit still performs poorly.", "When all holes are the same size, all algorithms perform similarly."],src:"Lecture 7 > Memory Management with Linked Lists"},
    ],
    tf: [
      {q:"Swapping involves bringing the entire process into memory before running it.",ans:true,exp:"Swapping brings the ENTIRE process into memory, runs it for a while, then puts it back on disk. This is distinct from virtual memory which runs programs only partially in memory.",src:"Lecture 7 > Swapping"},
      {q:"Memory compaction is frequently performed because it is fast and cheap.",ans:false,exp:"Memory compaction is usually NOT performed because it requires a lot of CPU time. On a 16-GB machine copying 8 bytes per 8 nsec, it would take about 16 seconds to compact all of memory.",src:"Lecture 7 > Swapping - Memory Compaction"},
      {q:"First-Fit is generally faster than Best-Fit.",ans:true,exp:"First-Fit is faster because it stops searching as soon as it finds the first adequate hole. Best-Fit must scan the entire list every time to find the smallest adequate hole.",src:"Lecture 7 > Memory Management with Linked Lists"},
      {q:"Worst-Fit has better storage utilization than First-Fit and Best-Fit.",ans:false,exp:"Simulation has shown that Worst-Fit has the WORST storage utilization. Both First-Fit and Best-Fit are better than Worst-Fit in terms of storage efficiency.",src:"Lecture 7 > Memory Management with Linked Lists"},
      {q:"External fragmentation is when available spaces are not contiguous despite having enough total free memory.",ans:true,exp:"External fragmentation: there is enough total free memory to satisfy a request, but the available spaces are not contiguous - storage is fragmented into many small scattered holes.",src:"Lecture 7 > Fragmentation"},
      {q:"In a bitmap, a bit value of 1 means the allocation unit is free.",ans:false,exp:"In a bitmap, 0 = unit is FREE and 1 = unit is OCCUPIED (or vice versa depending on convention - the lecture states 0 if free). A value of 1 indicates the unit is in use.",src:"Lecture 7 > Memory Management with Bitmaps"},
      {q:"Best-Fit searches the entire memory list every time it is called.",ans:true,exp:"Best-Fit searches the ENTIRE list from beginning to end every time it is called to find the smallest adequate hole. This makes it slower than First-Fit but potentially more space-efficient.",src:"Lecture 7 > Memory Management with Linked Lists - Best-Fit"},
      {q:"Virtual memory allows programs to run even when only partially in main memory.",ans:true,exp:"Virtual memory allows programs to run even when only partially in main memory - the OS keeps active parts in RAM and the rest on disk, swapping pages in and out as needed.",src:"Lecture 7 > Introduction"},
      {q:"Next-Fit always starts searching from the beginning of the memory list.",ans:false,exp:"Next-Fit starts searching from where it LEFT OFF last time - not from the beginning. This distributes allocations more evenly across memory compared to First-Fit.",src:"Lecture 7 > Memory Management with Linked Lists - Next-Fit"},
      {q:"Paging solves external fragmentation by allowing noncontiguous memory allocation.",ans:true,exp:"Paging permits the logical address space to be noncontiguous - a process can be allocated physical memory wherever page frames are available, eliminating external fragmentation.",src:"Lecture 7 > Fragmentation - Solution: Paging"},
      {q:"When swapping a process back in, it must always return to the same physical memory location it previously occupied.",ans:false},
      {q:"Best-Fit minimizes wasted space per allocation but can create many tiny unusable holes over time.",ans:true,exp:"Best-Fit tries to find the smallest hole adequate for a request. While it minimizes wasted space per allocation, it can leave many tiny leftover holes too small to be useful over time.",src:"Lecture 7 > Memory Management with Linked Lists - Best-Fit"},
      {q:"A bitmap's size depends only on the total memory size and the allocation unit size — not on the number of processes.",ans:true,exp:"The bitmap size = total memory / allocation unit size. It does not depend on the number of processes or how memory is currently used. This makes it a fixed, predictable overhead.",src:"Lecture 7 > Memory Management with Bitmaps"},
      {q:"First-Fit and Best-Fit perform equally well in terms of storage utilization.",ans:false,exp:"Simulation has shown that neither First-Fit nor Best-Fit is clearly better than the other in storage utilization. However, First-Fit is generally faster because it searches less.",src:"Lecture 7 > Memory Management with Linked Lists"},
      {q:"Processes swapped to disk still occupy main memory space while on disk.",ans:false,exp:"When a process is swapped to disk, it no longer occupies any main memory space. Only processes currently in memory use RAM. Swapped processes use only disk space.",src:"Lecture 7 > Swapping"},
    ]

      {q:"What were early solutions to programs too big to fit in memory called?",opts:["Segments","Overlays","Pages","Frames"],ans:1,exp:["Segments are a memory addressing technique.", "Overlays were the early solution: programs split into pieces, loaded as needed. The programmer had to manually decide the split.", "Pages are the modern virtual memory unit - they came after overlays.", "Frames are the physical memory counterpart of pages."],src:"Lecture 8 > Virtual Memory - History"},

      {q:"What is an MMU?",opts:["Main Memory Unit","Memory Management Unit that maps virtual to physical addresses","Multiple Memory Utility","Maximum Memory Usage"],ans:1,exp:["Main Memory Unit is not what MMU stands for.", "MMU = Memory Management Unit - hardware that maps virtual addresses to physical addresses before they go onto the memory bus.", "Multiple Memory Utility is not what MMU stands for.", "Maximum Memory Usage is not what MMU stands for."],src:"Lecture 8 > Paging - MMU"},

      {q:"The OS must evict a page frame. One candidate page is dirty, another is clean. Which should it prefer to evict?",opts:["The dirty page — it has more recent data","The clean page — it can be discarded without writing to disk","Either, it makes no difference","The larger page"],ans:1,exp:["The dirty page must be written to disk first.", "Evict the clean page - it can be discarded without writing to disk since the disk copy is still valid.", "It does make a significant difference.", "Page size is the same for all pages."],src:"Lecture 8 > Structure of a Page Table Entry - Modified Bit"},

// State per lecture
const state = lectures.map(l => ({
  mcAnswered: {},
  tfAnswers: {},
  mcScores: 0,
  tfScores: 0,
  submitted: false
}));

let activeLec = 0;

function totalForLec(li) {
  return lectures[li].mc.length + lectures[li].tf.length;
}

function answeredForLec(li) {
  return Object.keys(state[li].mcAnswered).length + Object.keys(state[li].tfAnswers).length;
}

function updateProgress() {
  const total = totalForLec(activeLec);
  const answered = answeredForLec(activeLec);
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = answered + ' / ' + total + ' answered — Lecture ' + activeLec;
  document.getElementById('prog-pct').textContent = pct + '%';
}

function getGrade(pct) {
  if(pct>=90) return 'A+'; if(pct>=85) return 'A'; if(pct>=80) return 'B+';
  if(pct>=75) return 'B'; if(pct>=70) return 'C+'; if(pct>=65) return 'C';
  if(pct>=60) return 'D+'; if(pct>=50) return 'D'; return 'F';
}

function revealMC(li, qi) {
  const item = lectures[li].mc[qi];
  const chosen = state[li].mcAnswered[qi];
  const card = document.getElementById(`l${li}-mc-card-${qi}`);
  item.opts.forEach((_,j) => {
    const opt = document.getElementById(`l${li}-mc-opt-${qi}-${j}`);
    opt.style.pointerEvents = 'none';
    if(j === item.ans) opt.classList.add('correct-opt');
    else if(j === chosen && chosen !== item.ans) { opt.classList.add('wrong-opt'); opt.classList.remove('selected'); }
  });
  const fb = document.getElementById(`l${li}-mc-fb-${qi}`);
  if(chosen === item.ans) {
    state[li].mcScores++;
    card.classList.add('correct-card');
    fb.textContent = '✓ Correct!'; fb.className = 'q-feedback show-correct';
  } else {
    card.classList.add('wrong-card');
    fb.textContent = '✗ Incorrect — correct: ' + letters[item.ans] + ') ' + item.opts[item.ans];
    fb.className = 'q-feedback show-wrong';
    if(item.exp) {
      const btn = document.getElementById(`l${li}-mc-explain-${qi}`);
      const panel = document.getElementById(`l${li}-mc-panel-${qi}`);
      if(btn) btn.classList.add('visible');
      if(panel && item.exp[chosen] !== undefined) {
        const src = item.src || '';
        panel.innerHTML = `${src ? `<div class="explain-source">${src}</div>` : ''}<div class="explain-why">${item.exp[chosen]}</div>`;
      }
    }
  }
  updateScoreCard(li);
}

function revealTF(li, i) {
  const item = lectures[li].tf[i];
  const chosen = state[li].tfAnswers[i];
  const card = document.getElementById(`l${li}-tf-card-${i}`);
  const tBtn = document.getElementById(`l${li}-tf-t-${i}`);
  const fBtn = document.getElementById(`l${li}-tf-f-${i}`);
  tBtn.style.pointerEvents = 'none'; fBtn.style.pointerEvents = 'none';
  const correctBtn = item.ans ? tBtn : fBtn;
  correctBtn.classList.add('correct-tf');
  if(chosen !== item.ans) (chosen ? tBtn : fBtn).classList.add('wrong-tf');
  const fb = document.getElementById(`l${li}-tf-fb-${i}`);
  if(chosen === item.ans) {
    state[li].tfScores++;
    card.classList.add('correct-card');
    fb.textContent = '✓ Correct!'; fb.className = 'q-feedback show-correct';
  } else {
    card.classList.add('wrong-card');
    fb.textContent = '✗ Incorrect — correct: ' + (item.ans ? 'True' : 'False');
    fb.className = 'q-feedback show-wrong';
    if(item.exp) {
      const btn = document.getElementById(`l${li}-tf-explain-${i}`);
      const panel = document.getElementById(`l${li}-tf-panel-${i}`);
      if(btn) btn.classList.add('visible');
      if(panel) {
        const src = item.src || '';
        panel.innerHTML = `${src ? `<div class="explain-source">${src}</div>` : ''}<div class="explain-why">${item.exp}</div>`;
      }
    }
  }
  updateScoreCard(li);
}

function toggleExplain(id) {
  const panel = document.getElementById(id);
  if(!panel) return;
  const btn = panel.previousElementSibling;
  const isOpen = panel.classList.contains('visible');
  panel.classList.toggle('visible', !isOpen);
  if(btn) btn.textContent = isOpen ? '📖 Explain' : '✕ Close';
}

function selectMC(li, qi, oi) {
  if(state[li].mcAnswered[qi] !== undefined) return;
  state[li].mcAnswered[qi] = oi;
  document.getElementById(`l${li}-mc-opt-${qi}-${oi}`).classList.add('selected');
  document.getElementById(`l${li}-mc-card-${qi}`).classList.add('answered');
  updateProgress();
  revealMC(li, qi);
}

function selectTF(li, i, val) {
  if(state[li].tfAnswers[i] !== undefined) return;
  state[li].tfAnswers[i] = val;
  document.getElementById(`l${li}-tf-${val ? 't' : 'f'}-${i}`).classList.add('selected');
  document.getElementById(`l${li}-tf-card-${i}`).classList.add('answered');
  updateProgress();
  revealTF(li, i);
}

function updateScoreCard(li) {
  const total = totalForLec(li);
  const answered = answeredForLec(li);
  const totalCorrect = state[li].mcScores + state[li].tfScores;
  const pct = answered > 0 ? Math.round(totalCorrect / answered * 100) : 0;
  const sc = document.getElementById(`l${li}-score`);
  sc.style.display = 'block';
  document.getElementById(`l${li}-sc-pct`).textContent = pct + '%';
  document.getElementById(`l${li}-sc-sub`).textContent = totalCorrect + ' correct out of ' + answered + ' answered';
  document.getElementById(`l${li}-sc-grade`).textContent = getGrade(pct);
  const mcAns = Object.keys(state[li].mcAnswered).length;
  const tfAns = Object.keys(state[li].tfAnswers).length;
  document.getElementById(`l${li}-sc-mc`).textContent = state[li].mcScores + ' / ' + mcAns;
  document.getElementById(`l${li}-sc-mc-pct`).textContent = mcAns > 0 ? Math.round(state[li].mcScores/mcAns*100) + '% accuracy' : '—';
  document.getElementById(`l${li}-sc-tf`).textContent = state[li].tfScores + ' / ' + tfAns;
  document.getElementById(`l${li}-sc-tf-pct`).textContent = tfAns > 0 ? Math.round(state[li].tfScores/tfAns*100) + '% accuracy' : '—';
  document.getElementById(`l${li}-sc-skip`).textContent = total - answered;
}

function resetLecture(li) {
  state[li].mcAnswered = {}; state[li].tfAnswers = {};
  state[li].mcScores = 0; state[li].tfScores = 0;
  buildLecture(li);
  updateProgress();
}

function scrollToScore(li) {
  document.getElementById(`l${li}-score`).scrollIntoView({behavior:'smooth', block:'center'});
}

function buildLecture(li) {
  const lec = lectures[li];
  const container = document.getElementById(`lec-${li}-content`);
  container.innerHTML = '';

  // MC section
  const mcHeader = document.createElement('div');
  mcHeader.className = 'section-header';
  mcHeader.innerHTML = `<div class="section-icon mc">MC</div><div><div class="section-title">Multiple Choice</div><div class="section-meta">${lec.mc.length} questions — select the best answer</div></div>`;
  container.appendChild(mcHeader);

  lec.mc.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'q-card'; card.id = `l${li}-mc-card-${i}`;
    const opts = item.opts.map((o,j) => `
      <label class="option" id="l${li}-mc-opt-${i}-${j}" onclick="selectMC(${li},${i},${j})">
        <input type="radio" name="l${li}-mc-${i}" value="${j}">
        <div class="option-dot"></div>
        <span class="option-letter">${letters[j]})</span>
        <span class="option-text">${o}</span>
      </label>`).join('');
    const explainHtml = item.exp ? `
      <button class="btn-explain" id="l${li}-mc-explain-${i}" onclick="toggleExplain('l${li}-mc-panel-${i}')">📖 Explain</button>
      <div class="explain-panel" id="l${li}-mc-panel-${i}"></div>` : '';
    card.innerHTML = `<div class="q-header"><span class="q-badge">${i+1}</span><span class="q-text">${item.q}</span></div><div class="options">${opts}</div><div class="q-feedback" id="l${li}-mc-fb-${i}"></div>${explainHtml}`;
    container.appendChild(card);
  });

  // Divider
  const div = document.createElement('div'); div.className = 'divider';
  container.appendChild(div);

  // TF section
  const tfHeader = document.createElement('div');
  tfHeader.className = 'section-header';
  tfHeader.innerHTML = `<div class="section-icon tf">T/F</div><div><div class="section-title">True or False</div><div class="section-meta">${lec.tf.length} questions</div></div>`;
  container.appendChild(tfHeader);

  lec.tf.forEach((item, i) => {
    const n = i + 1;
    const card = document.createElement('div');
    card.className = 'q-card'; card.id = `l${li}-tf-card-${i}`;
    const explainHtml = item.exp ? `
      <button class="btn-explain" id="l${li}-tf-explain-${i}" onclick="toggleExplain('l${li}-tf-panel-${i}')">📖 Explain</button>
      <div class="explain-panel" id="l${li}-tf-panel-${i}"></div>` : '';
    card.innerHTML = `<div class="q-header"><span class="q-badge">${n}</span><span class="q-text">${item.q}</span></div>
      <div class="tf-wrap">
        <button class="tf-btn" id="l${li}-tf-t-${i}" onclick="selectTF(${li},${i},true)"><div class="tf-dot"></div>True</button>
        <button class="tf-btn" id="l${li}-tf-f-${i}" onclick="selectTF(${li},${i},false)"><div class="tf-dot"></div>False</button>
      </div>
      <div class="q-feedback" id="l${li}-tf-fb-${i}"></div>${explainHtml}`;
    container.appendChild(card);
  });

  // Actions
  const actions = document.createElement('div');
  actions.className = 'actions';
  actions.innerHTML = `<button class="btn-primary" onclick="scrollToScore(${li})">View Score</button><button class="btn-secondary" onclick="resetLecture(${li})">Reset</button>`;
  container.appendChild(actions);

  // Score card
  const sc = document.createElement('div');
  sc.className = 'score-card'; sc.id = `l${li}-score`;
  sc.innerHTML = `<div class="score-card-inner">
    <div class="score-top">
      <div><div class="score-label">Score</div><div class="score-big" id="l${li}-sc-pct">—</div><div class="score-sub" id="l${li}-sc-sub">—</div></div>
      <div style="text-align:right"><div class="score-label">Grade</div><div class="score-grade" id="l${li}-sc-grade">—</div></div>
    </div>
    <div class="score-breakdown">
      <div class="score-section"><div class="score-section-label">Multiple Choice</div><div class="score-section-val" id="l${li}-sc-mc">—</div><div class="score-section-pct" id="l${li}-sc-mc-pct">—</div></div>
      <div class="score-section"><div class="score-section-label">True / False</div><div class="score-section-val" id="l${li}-sc-tf">—</div><div class="score-section-pct" id="l${li}-sc-tf-pct">—</div></div>
      <div class="score-section"><div class="score-section-label">Remaining</div><div class="score-section-val" id="l${li}-sc-skip">—</div><div class="score-section-pct" style="color:rgba(255,255,255,.35)">not yet answered</div></div>
    </div>
  </div>`;
  container.appendChild(sc);
}

function buildNav() {
  const tabs = document.getElementById('lec-tabs');
  const main = document.getElementById('main-content');
  lectures.forEach((lec, li) => {
    // Tab
    const tab = document.createElement('button');
    tab.className = 'lec-tab' + (li === 0 ? ' active' : '');
    tab.textContent = 'Lec ' + li;
    tab.onclick = () => switchLecture(li);
    tab.id = `tab-${li}`;
    tabs.appendChild(tab);

    // Section
    const section = document.createElement('div');
    section.className = 'lec-section' + (li === 0 ? ' active' : '');
    section.id = `lec-section-${li}`;
    const total = lec.mc.length + lec.tf.length;
    section.innerHTML = `
      <div class="lec-header">
        <div class="lec-num">Lecture ${li}</div>
        <div class="lec-title">${lec.title}</div>
        <div class="lec-stats">
          <span class="lec-stat">${total} total questions</span>
          <span class="lec-stat">${lec.mc.length} multiple choice</span>
          <span class="lec-stat">${lec.tf.length} true / false</span>
        </div>
      </div>
      <div id="lec-${li}-content"></div>`;
    main.appendChild(section);

    buildLecture(li);
  });
}

function switchLecture(li) {
  document.getElementById(`lec-section-${activeLec}`).classList.remove('active');
  document.getElementById(`tab-${activeLec}`).classList.remove('active');
  activeLec = li;
  document.getElementById(`lec-section-${li}`).classList.add('active');
  document.getElementById(`tab-${li}`).classList.add('active');
  updateProgress();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

window.addEventListener('scroll', () => {
  document.getElementById('scroll-btn').classList.toggle('visible', window.scrollY > 400);
});

buildNav();
updateProgress();
</script>
</body>
</html>
